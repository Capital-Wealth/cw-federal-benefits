<template>
    <div class="slds-p-around_medium">
        <template lwc:if={result}>
            <p class="slds-text-heading_small slds-m-bottom_x-small">✓ Survey sent</p>
            <p>The pre-Strategic-Review survey was emailed to <b>{sentTo}</b>.</p>
            <p class="slds-text-body_small slds-text-color_weak slds-m-top_x-small">Link: {url}</p>
            <div class="slds-m-top_medium slds-text-align_right">
                <lightning-button variant="brand" label="Done" onclick={handleClose}></lightning-button>
            </div>
        </template>
        <template lwc:else>
            <p>Email this client a short, optional survey to fill out before their Strategic Review? It helps you walk in already focused on what matters to them.</p>
            <template lwc:if={error}>
                <p class="slds-text-color_error slds-m-top_x-small">{error}</p>
            </template>
            <div class="slds-m-top_medium slds-text-align_right">
                <lightning-button label="Cancel" onclick={handleClose} class="slds-m-right_x-small"></lightning-button>
                <lightning-button variant="brand" label="Send survey" onclick={handleSend} disabled={loading}></lightning-button>
            </div>
        </template>
    </div>
</template>
